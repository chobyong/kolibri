# HIM Education dnsmasq — DHCP + DNS
interface=wlp1s0
bind-interfaces
except-interface=lo
listen-address=10.42.0.1
dhcp-range=10.42.0.10,10.42.0.254,255.255.255.0,12h
dhcp-option=3,10.42.0.1
dhcp-option=6,10.42.0.1
# Redirect ALL DNS to portal IP (walled garden)
address=/#/10.42.0.1
log-queries
log-dhcp
