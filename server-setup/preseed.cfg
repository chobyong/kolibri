#### HIM Education Server — Debian 13 (trixie) Preseed
#### Fully automatic installation matching HIM-010 configuration
#### Default login: him / him-edu  (change after first boot)

### Locale & keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Network — use DHCP on first NIC; prompt user for hostname
d-i netcfg/choose_interface select auto
# Leave hostname unset so the installer pauses and asks
# d-i netcfg/get_hostname string HIM-010
d-i netcfg/get_domain string local
# d-i netcfg/hostname string HIM-010
d-i netcfg/wireless_wep string

### Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i mirror/suite string trixie

### Clock & timezone
d-i clock-setup/utc boolean true
d-i time/zone string America/Los_Angeles
d-i clock-setup/ntp boolean true

### Partitioning — wipe disk, GPT, EFI + root + swap (matches HIM-010 layout)
d-i partman-auto/disk string /dev/sda
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-auto/expert_recipe string                         \
      boot-root ::                                            \
              1000 1000 1000 fat32                            \
                      $primary{ }                             \
                      method{ efi }                           \
                      format{ }                               \
              .                                               \
              16384 16384 16384 linux-swap                    \
                      $primary{ }                             \
                      method{ swap }                          \
                      format{ }                               \
              .                                               \
              10000 50000 -1 ext4                             \
                      $primary{ }                             \
                      method{ format }                        \
                      format{ }                               \
                      use_filesystem{ }                       \
                      filesystem{ ext4 }                      \
                      mountpoint{ / }                         \
              .
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-efi/non_efi_system boolean true

### Base system
d-i base-installer/install-recommends boolean true
d-i base-installer/kernel/image string linux-image-amd64

### APT — non-free firmware, security, updates
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/non-free boolean true
d-i apt-setup/contrib boolean false
d-i apt-setup/services-select multiselect security, updates
d-i apt-setup/security_host string security.debian.org

### Root account — disabled (sudo user only)
d-i passwd/root-login boolean false
d-i passwd/root-password-crypted password !

### User account
d-i passwd/user-fullname string him
d-i passwd/username string him
# Password: him-edu  (change after install: passwd him)
d-i passwd/user-password password him-edu
d-i passwd/user-password-again password him-edu
d-i passwd/user-default-groups string audio cdrom video sudo docker plugdev netdev

### Package selection
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string \
  sudo \
  git \
  curl \
  wget \
  vim \
  htop \
  iw \
  wireless-tools \
  rfkill \
  hostapd \
  dnsmasq \
  iptables \
  iptables-persistent \
  python3 \
  python3-pip \
  openssl \
  network-manager \
  ca-certificates \
  gnupg \
  lsb-release \
  apt-transport-https \
  nftables \
  ufw \
  openssh-server \
  net-tools \
  iputils-ping \
  dnsutils \
  lsof \
  tmux \
  unzip \
  jq

d-i pkgsel/upgrade select safe-upgrade
d-i pkgsel/update-policy select none

### Grub bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

### Avoid that last message about the install being complete
d-i finish-install/reboot_in_progress note

### Post-install: run provision script on first boot
# The provision.sh is embedded in the initrd at /preseed/provision.sh
# and copied to /target during installation.
d-i preseed/late_command string \
  in-target mkdir -p /opt/him-edu; \
  in-target mkdir -p /opt/him-edu/nextcloud; \
  cp /provision.sh /target/opt/him-edu/provision.sh 2>/dev/null || true; \
  in-target chmod +x /opt/him-edu/provision.sh; \
  echo '[Unit]' > /target/etc/systemd/system/him-provision.service; \
  echo 'Description=HIM Education First-Boot Provisioning' >> /target/etc/systemd/system/him-provision.service; \
  echo 'After=network-online.target' >> /target/etc/systemd/system/him-provision.service; \
  echo 'Wants=network-online.target' >> /target/etc/systemd/system/him-provision.service; \
  echo 'ConditionPathExists=/opt/him-edu/provision.sh' >> /target/etc/systemd/system/him-provision.service; \
  echo '[Service]' >> /target/etc/systemd/system/him-provision.service; \
  echo 'Type=oneshot' >> /target/etc/systemd/system/him-provision.service; \
  echo 'ExecStart=/opt/him-edu/provision.sh' >> /target/etc/systemd/system/him-provision.service; \
  echo 'ExecStartPost=/bin/rm -f /opt/him-edu/provision.sh' >> /target/etc/systemd/system/him-provision.service; \
  echo 'ExecStartPost=/bin/systemctl disable him-provision.service' >> /target/etc/systemd/system/him-provision.service; \
  echo 'RemainAfterExit=yes' >> /target/etc/systemd/system/him-provision.service; \
  echo 'StandardOutput=journal+console' >> /target/etc/systemd/system/him-provision.service; \
  echo '[Install]' >> /target/etc/systemd/system/him-provision.service; \
  echo 'WantedBy=multi-user.target' >> /target/etc/systemd/system/him-provision.service; \
  in-target systemctl enable him-provision.service
