<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HIM Education — User Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #eef2f7; color: #333; min-height: 100vh; padding: 20px;
    }
    .container {
      max-width: 900px; margin: 0 auto; background: #fff;
      border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.10); padding: 32px;
    }
    .logo { font-size: 1.6em; font-weight: 700; color: #0056b3; }
    .subtitle { font-size: 0.88em; color: #666; margin-bottom: 24px; margin-top: 2px; }
    h2 { font-size: 0.78em; font-weight: 700; color: #0056b3; text-transform: uppercase;
         letter-spacing: 0.08em; margin: 24px 0 12px; padding-top: 20px;
         border-top: 1px solid #eee; }
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 10px; }
    .field { flex: 1; min-width: 150px; }
    label { display: block; font-size: 0.82em; color: #555; margin-bottom: 4px; font-weight: 500; }
    input[type=text], input[type=password], select {
      border: 1px solid #ccc; border-radius: 6px; padding: 8px 10px;
      font-size: 0.92em; width: 100%; background: #fff; color: #333;
    }
    input[type=text]:focus, input[type=password]:focus, select:focus {
      outline: none; border-color: #0078d4; box-shadow: 0 0 0 2px rgba(0,120,212,0.15);
    }
    .btn {
      display: inline-block; padding: 9px 20px; border-radius: 6px; border: none;
      font-size: 0.92em; font-weight: 600; cursor: pointer; color: #fff; white-space: nowrap;
    }
    .btn:disabled { opacity: 0.55; cursor: default; }
    .btn-blue  { background: #0078d4; } .btn-blue:hover:not(:disabled)  { background: #005ea6; }
    .btn-green { background: #28a745; } .btn-green:hover:not(:disabled) { background: #218838; }
    .btn-grey  { background: #6c757d; } .btn-grey:hover:not(:disabled)  { background: #545b62; }
    .btn-red   { background: #dc3545; } .btn-red:hover:not(:disabled)   { background: #b02a37; }
    .btn-sm { padding: 5px 12px; font-size: 0.80em; }
    a.back { font-size: 0.85em; color: #0078d4; text-decoration: none; }
    a.back:hover { text-decoration: underline; }
    .alert { padding: 9px 13px; border-radius: 6px; font-size: 0.88em; margin: 8px 0; }
    .alert-info { background: #d1ecf1; color: #0c5460; }
    .alert-ok   { background: #d4edda; color: #155724; }
    .alert-err  { background: #f8d7da; color: #721c24; }
    .user-bar { display: flex; justify-content: space-between; align-items: center;
      font-size: 0.88em; color: #555; margin-bottom: 4px; }
    .btn-logout { background: none; border: none; color: #0078d4; cursor: pointer;
      font-size: 0.88em; text-decoration: underline; padding: 0; }

    /* Toolbar */
    .toolbar { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap;
      background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 8px;
      padding: 14px 16px; margin-bottom: 12px; }
    .toolbar .field { flex: 1; min-width: 160px; max-width: 260px; }

    /* User table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88em; }
    thead th {
      background: #f0f4f9; text-align: left; padding: 8px 10px;
      font-size: 0.78em; font-weight: 700; color: #0056b3;
      text-transform: uppercase; letter-spacing: 0.06em;
      border-bottom: 2px solid #dde3ec; white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid #f0f0f0; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafbff; }
    tbody td { padding: 6px 6px; vertical-align: middle; }
    tbody td input[type=text], tbody td input[type=password] {
      padding: 6px 8px; font-size: 0.88em; border-radius: 4px;
    }
    tbody td select { padding: 6px 8px; font-size: 0.88em; border-radius: 4px; }
    td.td-num { color: #aaa; font-size: 0.78em; padding-left: 10px; width: 28px; }
    td.td-status { width: 180px; font-size: 0.80em; }
    td.td-del { width: 32px; text-align: center; }

    .status-ok  { color: #155724; font-weight: 600; }
    .status-err { color: #721c24; }
    .status-run { color: #0056b3; font-style: italic; }

    .role-student { color: #0056b3; }
    .role-coach   { color: #28a745; }
    .role-admin   { color: #dc3545; }

    .stat-bar { display: flex; gap: 20px; font-size: 0.85em; color: #555;
      margin-bottom: 6px; flex-wrap: wrap; }
    .stat-bar span { font-weight: 700; color: #333; }

    .hidden { display: none !important; }
    .empty-row td { text-align: center; color: #aaa; font-style: italic;
      padding: 20px; font-size: 0.88em; }
  </style>
</head>
<body>
<div class="container">

  <div style="display:flex; justify-content:space-between; align-items:flex-start;">
    <div>
      <div class="logo">HIM Education</div>
      <div class="subtitle">User Manager — bulk create students, coaches &amp; admins in Kolibri</div>
    </div>
    <a class="back" href="/">&#8592; Home</a>
  </div>

  <!-- ══════════════════ LOGIN ══════════════════ -->
  <div id="login-section">
    <h2>Admin Login</h2>
    <div class="form-row">
      <div class="field">
        <label for="inp-user">Username</label>
        <input type="text" id="inp-user" autocomplete="username" placeholder="Admin username">
      </div>
      <div class="field">
        <label for="inp-pass">Password</label>
        <input type="password" id="inp-pass" autocomplete="current-password" placeholder="Password">
      </div>
      <div>
        <button class="btn btn-blue" id="btn-login" onclick="doLogin()">Log In</button>
      </div>
    </div>
    <div id="login-msg" class="hidden"></div>
  </div>

  <!-- ══════════════════ MAIN ══════════════════ -->
  <div id="main-section" class="hidden">

    <div class="user-bar" style="margin-top:4px;">
      <span>Logged in as <strong id="display-name"></strong>
        &nbsp;<span id="existing-count" style="color:#888; font-weight:400;"></span>
      </span>
      <button class="btn-logout" onclick="doLogout()">Log out</button>
    </div>

    <h2>Bulk User Creation</h2>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="field">
        <label for="default-pw">Default Password <span style="color:#aaa;font-weight:400;">(used when row is blank)</span></label>
        <input type="text" id="default-pw" placeholder="e.g. Welcome1">
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap; align-self:flex-end;">
        <button class="btn btn-grey btn-sm" onclick="addRow('student')">+ Student</button>
        <button class="btn btn-green btn-sm" onclick="addRow('coach')">+ Coach</button>
        <button class="btn btn-red btn-sm" onclick="addRow('admin')">+ Admin</button>
      </div>
      <div style="margin-left:auto; align-self:flex-end;">
        <button class="btn btn-blue" id="btn-create-all" onclick="createAll()">&#9654; Create All</button>
      </div>
    </div>

    <div id="create-msg" class="hidden"></div>

    <!-- Summary bar (shown after a run) -->
    <div id="stat-bar" class="stat-bar hidden">
      Results: <span id="stat-ok">0</span> created &nbsp;|&nbsp;
      <span id="stat-skip">0</span> skipped &nbsp;|&nbsp;
      <span id="stat-err">0</span> errors
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="td-num">#</th>
            <th>Username *</th>
            <th>Full Name</th>
            <th>Password</th>
            <th>Role</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="user-tbody">
          <tr class="empty-row" id="empty-row">
            <td colspan="7">No users added yet — use the buttons above to add rows.</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div><!-- /main-section -->
</div><!-- /container -->

<script>
// ══════════════════════════════════════════════ state
var facilityId = null;
var rowSeq = 0;          // monotonic row ID

// ══════════════════════════════════════════════ helpers
function el(id) { return document.getElementById(id); }

function msg(elId, text, type) {
  var d = el(elId);
  d.className = 'alert alert-' + (type || 'info');
  d.textContent = text;
  d.classList.remove('hidden');
}
function clearMsg(elId) { el(elId).classList.add('hidden'); }

function getCsrf() {
  var m = document.cookie.match(/csrftoken=([^;]+)/);
  return m ? m[1] : '';
}

async function apiCall(method, path, body) {
  var opts = {
    method: method,
    credentials: 'include',
    headers: { 'Content-Type': 'application/json' }
  };
  var csrf = getCsrf();
  if (csrf) opts.headers['X-CSRFToken'] = csrf;
  if (body !== undefined) opts.body = JSON.stringify(body);
  return fetch('/kolibri-api/' + path, opts);
}

// ══════════════════════════════════════════════ init
window.addEventListener('load', function() {
  el('inp-pass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  el('inp-user').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') el('inp-pass').focus();
  });
});

// ══════════════════════════════════════════════ auth
async function doLogin() {
  var username = el('inp-user').value.trim();
  var password = el('inp-pass').value;
  if (!username) { msg('login-msg', 'Enter your username.', 'err'); return; }

  msg('login-msg', 'Logging in…', 'info');
  el('btn-login').disabled = true;

  try {
    // Get facility first
    var fr = await apiCall('GET', 'auth/facility/');
    var fdata = await fr.json();
    if (Array.isArray(fdata) && fdata.length > 0) facilityId = fdata[0].id;

    var r = await apiCall('POST', 'auth/session/', {
      username: username,
      password: password,
      facility: facilityId
    });
    var data = await r.json();

    if (data && data.user_id && data.user_id !== 'ANONYMOUS') {
      // Check the user is admin or superuser
      if (!data.is_superuser && data.roles && !data.roles.some(function(role) {
        return role.kind === 'admin';
      })) {
        msg('login-msg', 'Access denied — admin account required.', 'err');
        el('btn-login').disabled = false;
        return;
      }
      clearMsg('login-msg');
      el('display-name').textContent = data.full_name || username;
      el('login-section').classList.add('hidden');
      el('main-section').classList.remove('hidden');
      loadUserCount();
    } else {
      var errMsg = 'Login failed. Check username and password.';
      if (Array.isArray(data) && data[0] && data[0].metadata) {
        errMsg = data[0].metadata.message || errMsg;
      }
      msg('login-msg', errMsg, 'err');
    }
  } catch(e) {
    msg('login-msg', 'Cannot reach Kolibri: ' + e.message, 'err');
  }
  el('btn-login').disabled = false;
}

async function doLogout() {
  try { await apiCall('DELETE', 'auth/session/'); } catch(e) {}
  el('main-section').classList.add('hidden');
  el('login-section').classList.remove('hidden');
  el('inp-user').value = '';
  el('inp-pass').value = '';
  clearMsg('login-msg');
  el('user-tbody').innerHTML =
    '<tr class="empty-row" id="empty-row"><td colspan="7">No users added yet — use the buttons above to add rows.</td></tr>';
  el('stat-bar').classList.add('hidden');
}

async function loadUserCount() {
  try {
    var r = await apiCall('GET', 'auth/facilityuser/?facility=' + facilityId);
    var data = await r.json();
    var count = Array.isArray(data) ? data.length : (data.count || '?');
    el('existing-count').textContent = '(' + count + ' users already in Kolibri)';
  } catch(e) {}
}

// ══════════════════════════════════════════════ row management
function addRow(defaultRole) {
  var id = ++rowSeq;
  var empty = el('empty-row');
  if (empty) empty.remove();

  var tr = document.createElement('tr');
  tr.id = 'row-' + id;
  tr.innerHTML =
    '<td class="td-num">' + id + '</td>' +
    '<td><input type="text" id="u-' + id + '" placeholder="username" style="width:130px;"></td>' +
    '<td><input type="text" id="n-' + id + '" placeholder="Full Name" style="width:150px;"></td>' +
    '<td><input type="text" id="p-' + id + '" placeholder="(use default)" style="width:110px;"></td>' +
    '<td>' +
      '<select id="r-' + id + '" onchange="applyRoleColor(' + id + ')">' +
        '<option value="student"' + (defaultRole === 'student' ? ' selected' : '') + '>Student</option>' +
        '<option value="coach"'   + (defaultRole === 'coach'   ? ' selected' : '') + '>Coach</option>' +
        '<option value="admin"'   + (defaultRole === 'admin'   ? ' selected' : '') + '>Admin</option>' +
      '</select>' +
    '</td>' +
    '<td class="td-status" id="s-' + id + '"><span style="color:#aaa;">—</span></td>' +
    '<td class="td-del"><button class="btn btn-sm" style="background:#eee;color:#555;padding:3px 8px;" ' +
      'onclick="removeRow(' + id + ')">✕</button></td>';

  el('user-tbody').appendChild(tr);
  applyRoleColor(id);
  el('u-' + id).focus();
}

function removeRow(id) {
  var tr = el('row-' + id);
  if (tr) tr.remove();
  if (el('user-tbody').children.length === 0) {
    var tr2 = document.createElement('tr');
    tr2.className = 'empty-row';
    tr2.id = 'empty-row';
    tr2.innerHTML = '<td colspan="7">No users added yet — use the buttons above to add rows.</td>';
    el('user-tbody').appendChild(tr2);
  }
}

function applyRoleColor(id) {
  var sel = el('r-' + id);
  if (!sel) return;
  sel.className = 'role-' + sel.value;
}

// ══════════════════════════════════════════════ create
function rowData(id) {
  return {
    id:       id,
    username: (el('u-' + id).value || '').trim(),
    fullName: (el('n-' + id).value || '').trim(),
    password: (el('p-' + id).value || '').trim() || (el('default-pw').value || '').trim(),
    role:      el('r-' + id).value
  };
}

function setStatus(id, text, cls) {
  var td = el('s-' + id);
  if (!td) return;
  td.innerHTML = '<span class="' + cls + '">' + text + '</span>';
}

async function createAll() {
  clearMsg('create-msg');
  var rows = [];
  el('user-tbody').querySelectorAll('tr[id^="row-"]').forEach(function(tr) {
    var id = parseInt(tr.id.replace('row-', ''), 10);
    rows.push(rowData(id));
  });

  if (rows.length === 0) {
    msg('create-msg', 'Add at least one user row first.', 'err');
    return;
  }

  var defaultPw = (el('default-pw').value || '').trim();
  var missing = rows.filter(function(r) { return !r.username; });
  if (missing.length > 0) {
    msg('create-msg', 'Some rows are missing a username — fill them in or remove the rows.', 'err');
    missing.forEach(function(r) { setStatus(r.id, '⚠ Username required', 'status-err'); });
    return;
  }
  var noPw = rows.filter(function(r) { return !r.password; });
  if (noPw.length > 0) {
    msg('create-msg', 'Some rows have no password and no default password is set.', 'err');
    noPw.forEach(function(r) { setStatus(r.id, '⚠ Password required', 'status-err'); });
    return;
  }

  el('btn-create-all').disabled = true;
  var okCount = 0, errCount = 0, skipCount = 0;

  for (var i = 0; i < rows.length; i++) {
    var row = rows[i];
    setStatus(row.id, '⏳ Creating…', 'status-run');

    try {
      // 1. Create the facility user
      var r = await apiCall('POST', 'auth/facilityuser/', {
        username:  row.username,
        full_name: row.fullName || row.username,
        password:  row.password,
        facility:  facilityId
      });
      var data = await r.json();

      if (!r.ok) {
        var errText = extractError(data);
        setStatus(row.id, '✗ ' + errText, 'status-err');
        errCount++;
        continue;
      }

      var userId = data.id;

      // 2. Assign role if coach or admin
      if (row.role === 'coach' || row.role === 'admin') {
        var rr = await apiCall('POST', 'auth/role/', {
          user:       userId,
          collection: facilityId,
          kind:       row.role
        });
        if (!rr.ok) {
          var rd = await rr.json();
          setStatus(row.id, '✓ User created, role failed: ' + extractError(rd), 'status-err');
          errCount++;
          continue;
        }
      }

      setStatus(row.id, '✓ Created (' + row.role + ')', 'status-ok');
      okCount++;

    } catch(e) {
      setStatus(row.id, '✗ ' + e.message, 'status-err');
      errCount++;
    }
  }

  el('btn-create-all').disabled = false;
  el('stat-ok').textContent   = okCount;
  el('stat-skip').textContent = skipCount;
  el('stat-err').textContent  = errCount;
  el('stat-bar').classList.remove('hidden');
  loadUserCount();
}

function extractError(data) {
  if (typeof data === 'string') return data;
  if (Array.isArray(data) && data[0]) {
    if (data[0].metadata && data[0].metadata.message) return data[0].metadata.message;
    if (data[0].id) return data[0].id;
  }
  if (data && data.username)  return 'Username: ' + data.username[0];
  if (data && data.password)  return 'Password: ' + data.password[0];
  if (data && data.non_field_errors) return data.non_field_errors[0];
  return JSON.stringify(data).substring(0, 80);
}
</script>
</body>
</html>
