<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HIM Education — Lesson Builder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #eef2f7;
      color: #333;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 820px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.10);
      padding: 32px;
    }
    .logo { font-size: 1.6em; font-weight: 700; color: #0056b3; }
    .subtitle { font-size: 0.88em; color: #666; margin-bottom: 24px; margin-top: 2px; }

    h2 { font-size: 0.78em; font-weight: 700; color: #0056b3; text-transform: uppercase;
         letter-spacing: 0.08em; margin: 24px 0 12px; padding-top: 20px;
         border-top: 1px solid #eee; }

    .form-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 10px; }
    .field { flex: 1; min-width: 150px; }
    label { display: block; font-size: 0.82em; color: #555; margin-bottom: 4px; font-weight: 500; }
    input[type=text], input[type=password], select {
      border: 1px solid #ccc; border-radius: 6px; padding: 8px 10px;
      font-size: 0.92em; width: 100%; background: #fff; color: #333;
    }
    input[type=text]:focus, input[type=password]:focus, select:focus {
      outline: none; border-color: #0078d4; box-shadow: 0 0 0 2px rgba(0,120,212,0.15);
    }

    .btn {
      display: inline-block; padding: 9px 20px; border-radius: 6px; border: none;
      font-size: 0.92em; font-weight: 600; cursor: pointer; color: #fff;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.55; cursor: default; }
    .btn-blue   { background: #0078d4; }
    .btn-blue:hover:not(:disabled)  { background: #005ea6; }
    .btn-green  { background: #28a745; }
    .btn-green:hover:not(:disabled) { background: #218838; }
    .btn-sm { padding: 5px 12px; font-size: 0.80em; }
    .btn-grey { background: #6c757d; }
    .btn-grey:hover { background: #545b62; }
    a.back { font-size: 0.85em; color: #0078d4; text-decoration: none; }
    a.back:hover { text-decoration: underline; }

    .alert { padding: 9px 13px; border-radius: 6px; font-size: 0.88em; margin: 8px 0; }
    .alert-info  { background: #d1ecf1; color: #0c5460; }
    .alert-ok    { background: #d4edda; color: #155724; }
    .alert-err   { background: #f8d7da; color: #721c24; }

    /* Results list */
    #results-list { list-style: none; max-height: 380px; overflow-y: auto;
      border: 1px solid #e0e0e0; border-radius: 8px; margin: 8px 0; }
    #results-list li { padding: 9px 12px; border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: flex-start; gap: 10px; cursor: pointer; }
    #results-list li:last-child { border-bottom: none; }
    #results-list li:hover { background: #f5f8ff; }
    #results-list input[type=checkbox] { margin-top: 3px; flex-shrink: 0; }
    .node-title { font-weight: 500; font-size: 0.92em; }
    .node-desc  { font-size: 0.78em; color: #888; margin-top: 2px; }
    .badge { display: inline-block; padding: 1px 7px; border-radius: 10px;
      font-size: 0.70em; font-weight: 700; text-transform: uppercase;
      background: #e8f0fe; color: #1a56db; margin-left: 6px; vertical-align: middle; }
    .badge-exercise { background: #fff3cd; color: #856404; }
    .badge-document { background: #e2f0d9; color: #2d6a23; }
    .badge-audio    { background: #fce4ec; color: #880e4f; }
    .badge-html5    { background: #f3e5f5; color: #6a1b9a; }

    .toolbar { display: flex; align-items: center; gap: 12px; margin: 6px 0 4px;
      font-size: 0.85em; color: #555; flex-wrap: wrap; }

    .create-box { background: #f8f9fa; border: 1px solid #e9ecef;
      border-radius: 8px; padding: 18px; margin-top: 8px; }
    .selected-count { font-weight: 700; color: #0056b3; font-size: 1.05em; }

    .user-bar { display: flex; justify-content: space-between; align-items: center;
      font-size: 0.88em; color: #555; margin-bottom: 4px; }
    .btn-logout { background: none; border: none; color: #0078d4; cursor: pointer;
      font-size: 0.88em; text-decoration: underline; padding: 0; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="container">

  <div style="display:flex; justify-content:space-between; align-items:flex-start;">
    <div>
      <div class="logo">HIM Education</div>
      <div class="subtitle">Lesson Builder — find content by grade &amp; subject, create a class lesson</div>
    </div>
    <a class="back" href="/">&#8592; Home</a>
  </div>

  <!-- ══════════════════════════════ LOGIN ════════════════════════════ -->
  <div id="login-section">
    <h2>Coach Login</h2>
    <div class="form-row">
      <div class="field">
        <label for="inp-user">Username</label>
        <input type="text" id="inp-user" autocomplete="username" placeholder="Coach username">
      </div>
      <div class="field">
        <label for="inp-pass">Password</label>
        <input type="password" id="inp-pass" autocomplete="current-password" placeholder="Password">
      </div>
      <div>
        <button class="btn btn-blue" id="btn-login" onclick="doLogin()">Log In</button>
      </div>
    </div>
    <div id="login-msg" class="hidden"></div>
  </div>

  <!-- ══════════════════════════════ MAIN ═════════════════════════════ -->
  <div id="main-section" class="hidden">

    <div class="user-bar" style="margin-top:4px;">
      <span>Logged in as <strong id="display-name"></strong></span>
      <button class="btn-logout" onclick="doLogout()">Log out</button>
    </div>

    <!-- ── Search ── -->
    <h2>1 — Find Content</h2>
    <div class="form-row">
      <div class="field">
        <label for="sel-grade">Grade Level</label>
        <select id="sel-grade"></select>
      </div>
      <div class="field">
        <label for="sel-subject">Subject</label>
        <select id="sel-subject"></select>
      </div>
      <div>
        <button class="btn btn-blue" id="btn-search" onclick="doSearch()">Search</button>
      </div>
    </div>
    <div id="search-msg" class="hidden"></div>

    <div id="results-section" class="hidden">
      <div class="toolbar">
        <span id="result-count"></span>
        <button class="btn btn-sm btn-blue"  onclick="selectAll()">Select All</button>
        <button class="btn btn-sm btn-grey"  onclick="clearSel()">Clear</button>
      </div>
      <ul id="results-list"></ul>
    </div>

    <!-- ── Create Lesson ── -->
    <h2>2 — Create Lesson</h2>
    <div class="create-box">
      <p style="font-size:0.88em; margin-bottom:14px;">
        Items selected: <span class="selected-count" id="sel-count">0</span>
      </p>
      <div class="form-row">
        <div class="field" style="flex:2; min-width:200px;">
          <label for="inp-title">Lesson Name</label>
          <input type="text" id="inp-title" placeholder="e.g. Grade 5 Math — Fractions Week 1">
        </div>
        <div class="field">
          <label for="sel-class">Assign to Class</label>
          <select id="sel-class">
            <option value="">— select class —</option>
          </select>
        </div>
        <div>
          <button class="btn btn-green" id="btn-create" onclick="doCreateLesson()">
            Create Lesson
          </button>
        </div>
      </div>
      <div id="lesson-msg" class="hidden"></div>
    </div>

  </div><!-- /main-section -->
</div><!-- /container -->

<script>
// ═══════════════════════════════════════════════════════ constants

var GRADES = [
  { id: '',          label: 'All Grades' },
  { id: 'FOhG0ib',  label: 'Preschool' },
  { id: 'wnarlxKo', label: 'Lower Primary  (K – 2)' },
  { id: 'BkGYi3lD', label: 'Upper Primary  (3 – 5)' },
  { id: 'eLt0Mbu4', label: 'Lower Secondary  (6 – 8)' },
  { id: 'ZEjiwvOb', label: 'Upper Secondary  (9 – 12)' },
  { id: 'FYxwbxts', label: 'Tertiary' },
  { id: 'H64ZOHfi', label: 'Basic Skills' },
];

var SUBJECTS = [
  { id: '',                    label: 'All Subjects' },
  { id: 'd&WXdXWF.qs0Xlaxq',  label: 'Mathematics' },
  { id: 'd&WXdXWF.i1IdaNwr',  label: 'Sciences' },
  { id: 'd&WXdXWF.kHKJ&PbV',  label: 'Reading & Writing' },
  { id: 'd&WXdXWF.JDUfJNXc',  label: 'Language Learning' },
  { id: 'd&WXdXWF.zWtcJ&F2',  label: 'History' },
  { id: 'd&WXdXWF.K80UMYnW',  label: 'Social Sciences' },
  { id: 'd&WXdXWF.5QAjgfv7',  label: 'Arts' },
  { id: 'd&WXdXWF.e#RTW9E#',  label: 'Computer Science' },
  { id: 'BCG3&slG.wZ3EAedB',  label: 'Digital Literacy' },
  { id: 'PbGoe2MV.kivAZaeX',  label: 'Health' },
  { id: 'BCG3&slG',           label: 'Foundations / Basic Skills' },
  { id: 'ziJ6PCuU',           label: 'For Teachers' },
];

var LEAF_KINDS = 'video,exercise,document,audio,html5,slideshow';

// ═══════════════════════════════════════════════════════ state

var facilityId   = null;
var currentNodes = [];        // nodes from last search
var selectedNodes = {};       // id → node

// ═══════════════════════════════════════════════════════ helpers

function el(id) { return document.getElementById(id); }

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function msg(elId, text, type) {
  var d = el(elId);
  d.className = 'alert alert-' + (type || 'info');
  d.textContent = text;
  d.classList.remove('hidden');
}

function clearMsg(elId) { el(elId).classList.add('hidden'); }

function getCsrf() {
  var m = document.cookie.match(/csrftoken=([^;]+)/);
  return m ? m[1] : '';
}

// All API calls go through /kolibri-api/ on the portal (port 80)
// which the portal server proxies to Kolibri on port 8080.
async function apiCall(method, path, body) {
  var opts = {
    method: method,
    credentials: 'include',
    headers: { 'Content-Type': 'application/json' }
  };
  var csrf = getCsrf();
  if (csrf) opts.headers['X-CSRFToken'] = csrf;
  if (body !== undefined) opts.body = JSON.stringify(body);
  return fetch('/kolibri-api/' + path, opts);
}

function updateSelCount() {
  el('sel-count').textContent = Object.keys(selectedNodes).length;
}

// ═══════════════════════════════════════════════════════ init

window.addEventListener('load', function() {
  populateSelect('sel-grade',   GRADES);
  populateSelect('sel-subject', SUBJECTS);
  fetchFacility();

  el('inp-pass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  el('inp-user').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') el('inp-pass').focus();
  });
});

function populateSelect(selId, items) {
  var sel = el(selId);
  items.forEach(function(item) {
    var o = document.createElement('option');
    o.value = item.id;
    o.textContent = item.label;
    sel.appendChild(o);
  });
}

async function fetchFacility() {
  try {
    var r = await apiCall('GET', 'auth/facility/');
    var data = await r.json();
    if (Array.isArray(data) && data.length > 0) facilityId = data[0].id;
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════ auth

async function doLogin() {
  var username = el('inp-user').value.trim();
  var password = el('inp-pass').value;
  if (!username) { msg('login-msg', 'Enter your username.', 'err'); return; }

  msg('login-msg', 'Logging in…', 'info');
  el('btn-login').disabled = true;

  try {
    var r = await apiCall('POST', 'auth/session/', {
      username: username,
      password: password,
      facility: facilityId
    });
    var data = await r.json();

    // Success: Kolibri returns an object with user_id
    if (data && data.user_id && data.user_id !== 'ANONYMOUS') {
      clearMsg('login-msg');
      el('display-name').textContent = data.full_name || username;
      el('login-section').classList.add('hidden');
      el('main-section').classList.remove('hidden');
      loadClasses();
    } else {
      // Error: Kolibri returns [{id: "NOT_FOUND", metadata: {message: "..."}}]
      var errMsg = 'Login failed. Check username and password.';
      if (Array.isArray(data) && data[0] && data[0].metadata) {
        errMsg = data[0].metadata.message || errMsg;
      }
      msg('login-msg', errMsg, 'err');
    }
  } catch(e) {
    msg('login-msg', 'Cannot reach Kolibri: ' + e.message, 'err');
  }

  el('btn-login').disabled = false;
}

async function doLogout() {
  try { await apiCall('DELETE', 'auth/session/'); } catch(e) {}
  selectedNodes = {};
  currentNodes  = [];
  el('main-section').classList.add('hidden');
  el('login-section').classList.remove('hidden');
  el('inp-user').value = '';
  el('inp-pass').value = '';
  el('results-section').classList.add('hidden');
  el('results-list').innerHTML = '';
  clearMsg('login-msg');
  updateSelCount();
}

// ═══════════════════════════════════════════════════════ classes

async function loadClasses() {
  var sel = el('sel-class');
  sel.innerHTML = '<option value="">— select class —</option>';
  try {
    var r = await apiCall('GET', 'kolibriauth/collection/?kind=classroom');
    var data = await r.json();
    if (Array.isArray(data)) {
      if (data.length === 0) {
        var o = document.createElement('option');
        o.disabled = true;
        o.textContent = '(no classes yet — create one in Kolibri first)';
        sel.appendChild(o);
      } else {
        data.forEach(function(cls) {
          var o = document.createElement('option');
          o.value = cls.id;
          o.textContent = cls.name;
          sel.appendChild(o);
        });
      }
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════ search

async function doSearch() {
  var grade   = el('sel-grade').value;
  var subject = el('sel-subject').value;
  if (!grade && !subject) {
    msg('search-msg', 'Choose a grade level or subject to search.', 'info');
    return;
  }

  msg('search-msg', 'Searching…', 'info');
  el('btn-search').disabled = true;
  el('results-section').classList.add('hidden');

  var params = new URLSearchParams({
    available: 'true',
    kind_in:   LEAF_KINDS,
    limit:     '50'
  });
  if (grade)   params.append('grade_levels', grade);
  if (subject) params.append('categories', subject);

  try {
    var r    = await apiCall('GET', 'content/contentnode/?' + params.toString());
    var data = await r.json();
    var nodes = Array.isArray(data) ? data : (data.results || []);
    currentNodes = nodes;
    clearMsg('search-msg');
    renderResults(nodes);
  } catch(e) {
    msg('search-msg', 'Search error: ' + e.message, 'err');
  }

  el('btn-search').disabled = false;
}

function renderResults(nodes) {
  var list = el('results-list');
  list.innerHTML = '';

  el('result-count').textContent =
    nodes.length + ' result' + (nodes.length !== 1 ? 's' : '');

  nodes.forEach(function(node) {
    var li   = document.createElement('li');
    var kind = (node.kind || '').toLowerCase();
    var badgeCls = 'badge' + (kind ? ' badge-' + kind : '');
    var checked  = selectedNodes[node.id] ? ' checked' : '';

    li.innerHTML =
      '<input type="checkbox"' + checked + '>' +
      '<div style="flex:1;">' +
        '<div class="node-title">' + esc(node.title) +
          '<span class="' + badgeCls + '">' + esc(kind) + '</span>' +
        '</div>' +
        (node.description
          ? '<div class="node-desc">' + esc(node.description.substring(0, 120)) + '</div>'
          : '') +
      '</div>';

    // Click anywhere on the row toggles the checkbox
    li.addEventListener('click', function(e) {
      if (e.target.tagName !== 'INPUT') {
        var cb = li.querySelector('input');
        cb.checked = !cb.checked;
        cb.dispatchEvent(new Event('change'));
      }
    });

    var cb = li.querySelector('input');
    cb.addEventListener('change', function() {
      if (this.checked) {
        selectedNodes[node.id] = node;
      } else {
        delete selectedNodes[node.id];
      }
      updateSelCount();
    });

    list.appendChild(li);
  });

  el('results-section').classList.remove('hidden');
  updateSelCount();
}

function selectAll() {
  currentNodes.forEach(function(node) { selectedNodes[node.id] = node; });
  el('results-list').querySelectorAll('input[type=checkbox]').forEach(function(cb) {
    cb.checked = true;
  });
  updateSelCount();
}

function clearSel() {
  selectedNodes = {};
  el('results-list').querySelectorAll('input[type=checkbox]').forEach(function(cb) {
    cb.checked = false;
  });
  updateSelCount();
}

// ═══════════════════════════════════════════════════════ create lesson

async function doCreateLesson() {
  var title   = el('inp-title').value.trim();
  var classId = el('sel-class').value;
  var items   = Object.values(selectedNodes);

  if (!title)   { msg('lesson-msg', 'Enter a lesson name.', 'err'); return; }
  if (!classId) { msg('lesson-msg', 'Select a class to assign the lesson to.', 'err'); return; }
  if (items.length === 0) {
    msg('lesson-msg', 'Select at least one content item from the search results above.', 'err');
    return;
  }

  msg('lesson-msg', 'Creating lesson…', 'info');
  el('btn-create').disabled = true;

  var resources = items.map(function(node) {
    return {
      contentnode_id: node.id,
      channel_id:     node.channel_id,
      content_id:     node.content_id
    };
  });

  try {
    var r = await apiCall('POST', 'lessons/lesson/', {
      title:       title,
      description: '',
      collection:  classId,
      assignments: [classId],
      resources:   resources,
      active:      true
    });
    var data = await r.json();

    if (r.ok && data.id) {
      msg('lesson-msg',
        'Lesson "' + title + '" created with ' + items.length + ' item(s) — visible in Kolibri now!',
        'ok');
      el('inp-title').value = '';
      selectedNodes = {};
      el('results-list').querySelectorAll('input[type=checkbox]').forEach(function(cb) {
        cb.checked = false;
      });
      updateSelCount();
    } else {
      var errText = JSON.stringify(data);
      msg('lesson-msg', 'Could not create lesson: ' + errText, 'err');
    }
  } catch(e) {
    msg('lesson-msg', 'Error: ' + e.message, 'err');
  }

  el('btn-create').disabled = false;
}
</script>
</body>
</html>
